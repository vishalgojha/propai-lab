services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    environment:
      LAB_HOST: 0.0.0.0
      LAB_PORT: 8000
      STATUS_FILE: /data/status.json
      INGESTOR_INTERNAL_URL: http://ingestor:3001
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      FRONTEND_URL: https://app.propai.live
    volumes:
      - propai-data:/data
    expose:
      - "8000"
    restart: unless-stopped

  app:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        LAB_API_BASE_URL: http://api:8000
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
        DOUBLEWORD_API_URL: ${DOUBLEWORD_API_URL}
        DOUBLEWORD_API_KEY: ${DOUBLEWORD_API_KEY}
        DOUBLEWORD_MODEL: ${DOUBLEWORD_MODEL}
    environment:
      LAB_API_BASE_URL: http://api:8000
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      DOUBLEWORD_API_URL: ${DOUBLEWORD_API_URL}
      DOUBLEWORD_API_KEY: ${DOUBLEWORD_API_KEY}
      DOUBLEWORD_MODEL: ${DOUBLEWORD_MODEL}
    depends_on:
      - api
    expose:
      - "3000"
    restart: unless-stopped

  ingestor:
    build:
      context: ../..
      dockerfile: services/whatsmeow-ingestor/Dockerfile
    environment:
      PROPAI_WEBHOOK_URL: https://api.propai.live/webhook
      PROPAI_API_URL: https://api.propai.live
      PROPAI_INSTANCE_NAME: propai-whatsmeow
      STATUS_FILE: /data/status_default.json
      DATABASE_URL: postgres://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_REF}.supabase.co:5432/postgres?sslmode=require
    volumes:
      - propai-data:/data
    depends_on:
      - api
    expose:
      - "3001"
    restart: unless-stopped

  extraction-worker:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    command: ["python", "extraction_worker.py", "--poll", "5"]
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      FRONTEND_URL: https://app.propai.live
      EXTRACTION_WORKER_BATCH_SIZE: 10
      EXTRACTION_WORKER_POLL_SECONDS: 5
    depends_on:
      - api
    restart: unless-stopped

volumes:
  propai-data:

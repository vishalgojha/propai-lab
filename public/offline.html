<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PropAI — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 360px;
    }
    img { width: 72px; height: 72px; margin-bottom: 24px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #a0a0a0; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 999px;
      background: #3EE88A;
      color: #000;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    .btn:hover { background: #2DC96E; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/propai-logo.svg" alt="PropAI" />
    <h1>You're offline</h1>
    <p>PropAI needs a network connection to load this page. Check your connection and try again.</p>
    <button class="btn" onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
